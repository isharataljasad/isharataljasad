<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>إشارات الجسد | Bio-OS</title>
  <style>
    :root {
      --bg: #06111e;
      --bg-2: #08172a;
      --panel: rgba(9, 22, 40, 0.82);
      --panel-2: rgba(9, 22, 40, 0.92);
      --line: rgba(78, 134, 202, 0.30);
      --line-soft: rgba(78, 134, 202, 0.14);
      --text: #edf5ff;
      --muted: #9fb7d5;
      --accent: #7fc4ff;
      --accent-2: #49d18c;
      --danger: #ff6b79;
      --warn: #f6be4f;
      --radius: 22px;
      --shadow: 0 14px 36px rgba(0,0,0,.28), inset 0 0 0 1px rgba(132,183,255,.06);
      --grid-gap: 16px;
      --header-h: 160px;
      --font: "Segoe UI", Tahoma, Arial, sans-serif;
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      font-family: var(--font);
      color: var(--text);
      background:
        linear-gradient(rgba(68,123,196,.11) 1px, transparent 1px),
        linear-gradient(90deg, rgba(68,123,196,.11) 1px, transparent 1px),
        radial-gradient(circle at 20% 0%, rgba(40,99,176,.12), transparent 26%),
        linear-gradient(180deg, #07111d 0%, #05101b 100%);
      background-size: 36px 36px, 36px 36px, auto, auto;
      overflow-x: hidden;
    }

    .shell {
      width: min(1600px, calc(100vw - 32px));
      margin: 18px auto 28px;
    }

    .topbar {
      display: grid;
      grid-template-columns: 1.35fr 1fr;
      gap: var(--grid-gap);
      margin-bottom: var(--grid-gap);
    }

    .hero, .metrics, .window, .tab-btn, .status-pill {
      border: 1px solid var(--line);
      background: linear-gradient(180deg, rgba(14,28,50,.95), rgba(7,20,37,.9));
      box-shadow: var(--shadow);
    }

    .hero {
      min-height: var(--header-h);
      border-radius: 28px;
      padding: 22px 26px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    .hero::before {
      content: "";
      position: absolute;
      inset: auto -6% -40% auto;
      width: 280px;
      height: 280px;
      background: radial-gradient(circle, rgba(127,196,255,.18) 0%, rgba(127,196,255,0) 68%);
      pointer-events: none;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      justify-content: space-between;
    }

    .brand h1 {
      margin: 0;
      font-size: 32px;
      line-height: 1.1;
      letter-spacing: .2px;
    }

    .brand small {
      display: block;
      color: var(--muted);
      font-size: 13px;
      margin-top: 8px;
      max-width: 620px;
      line-height: 1.8;
    }

    .status-strip {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
      margin-top: 18px;
    }

    .status-pill {
      min-height: 74px;
      border-radius: 18px;
      padding: 12px 14px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .status-pill .k {
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 6px;
    }

    .status-pill .v {
      font-size: 15px;
      font-weight: 700;
      line-height: 1.35;
    }

    .metrics {
      min-height: var(--header-h);
      border-radius: 28px;
      padding: 18px;
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
      align-content: start;
    }

    .metric-card {
      border: 1px solid var(--line-soft);
      border-radius: 18px;
      padding: 14px;
      min-height: 90px;
      background: rgba(8, 20, 36, .62);
    }

    .metric-card .label {
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 8px;
    }

    .metric-card .value {
      font-size: 15px;
      font-weight: 800;
      line-height: 1.45;
    }

    .metric-card.good .value { color: #7ef0a8; }
    .metric-card.warn .value { color: #ffd166; }
    .metric-card.danger .value { color: #ff8994; }

    .nav-tabs {
      display: grid;
      grid-template-columns: repeat(7, minmax(0, 1fr));
      gap: 12px;
      margin-bottom: var(--grid-gap);
    }

    .tab-btn {
      border-radius: 18px;
      padding: 16px 10px;
      min-height: 86px;
      text-align: center;
      color: var(--text);
      cursor: pointer;
      transition: .18s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: 700;
      line-height: 1.3;
      user-select: none;
    }

    .tab-btn:hover, .tab-btn.active {
      transform: translateY(-1px);
      border-color: rgba(127,196,255,.62);
      background: linear-gradient(180deg, rgba(19,42,73,.96), rgba(8,22,39,.95));
      box-shadow: 0 0 0 1px rgba(127,196,255,.12), 0 14px 30px rgba(0,0,0,.28);
    }

    .workspace {
      display: grid;
      grid-template-columns: 1fr 2fr 1fr;
      gap: var(--grid-gap);
      align-items: start;
    }

    .col {
      display: grid;
      gap: var(--grid-gap);
    }

    .window {
      border-radius: 26px;
      padding: 18px;
      min-height: 200px;
      position: relative;
      overflow: hidden;
    }

    .window::before {
      content: attr(data-code);
      position: absolute;
      top: 18px;
      right: 18px;
      font-size: 12px;
      color: rgba(174,198,230,.78);
      letter-spacing: .9px;
    }

    .window-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 18px;
      padding-top: 12px;
      border-bottom: 1px solid rgba(98,145,205,.18);
      padding-bottom: 16px;
    }

    .window-title {
      font-size: 18px;
      font-weight: 800;
      margin: 0;
      line-height: 1.4;
    }

    .window-subtitle {
      font-size: 12px;
      color: var(--muted);
      margin-top: 6px;
      line-height: 1.8;
    }

    .stack { display: grid; gap: 12px; }
    .tiles-2 { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 12px; }
    .tiles-3 { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 12px; }

    .tile, .list-item, .field, .button {
      border: 1px solid rgba(98,145,205,.18);
      background: rgba(9,22,40,.58);
      border-radius: 18px;
    }

    .tile {
      min-height: 102px;
      padding: 14px;
    }

    .tile .t-label {
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 10px;
    }

    .tile .t-value {
      font-weight: 800;
      font-size: 28px;
      line-height: 1.1;
      margin-bottom: 8px;
    }

    .tile .t-note {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.6;
    }

    .list-item {
      padding: 14px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      min-height: 74px;
    }

    .list-item strong {
      font-size: 17px;
      line-height: 1.4;
    }

    .list-item small {
      color: var(--muted);
      display: block;
      margin-top: 6px;
      line-height: 1.6;
      font-size: 12px;
    }

    .badge {
      min-width: 44px;
      height: 44px;
      border-radius: 14px;
      display: inline-grid;
      place-items: center;
      border: 1px solid rgba(98,145,205,.22);
      color: var(--accent);
      font-weight: 800;
      background: rgba(8, 23, 44, .78);
      flex-shrink: 0;
    }

    .field-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 12px; }
    .field {
      min-height: 74px;
      padding: 12px 14px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .field label {
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 8px;
    }

    .field .mock-input {
      min-height: 34px;
      font-size: 18px;
      font-weight: 700;
    }

    .text-block {
      border: 1px solid rgba(98,145,205,.18);
      background: rgba(9,22,40,.5);
      border-radius: 18px;
      padding: 16px;
      line-height: 1.95;
      font-size: 15px;
      color: #d8e8fb;
    }

    .button-row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .button {
      padding: 14px 18px;
      min-width: 126px;
      text-align: center;
      font-weight: 800;
    }

    .button.primary {
      border-color: rgba(127,196,255,.68);
      background: linear-gradient(180deg, rgba(34,76,126,.95), rgba(17,39,68,.95));
    }

    .ring {
      width: 136px;
      height: 136px;
      margin: 8px auto 0;
      border-radius: 50%;
      background: conic-gradient(var(--accent) calc(var(--p) * 1%), rgba(127,196,255,.1) 0);
      display: grid;
      place-items: center;
      position: relative;
    }

    .ring::after {
      content: "";
      width: 92px;
      height: 92px;
      border-radius: 50%;
      background: #091a2e;
      border: 1px solid rgba(127,196,255,.14);
    }

    .ring span {
      position: absolute;
      font-weight: 800;
      font-size: 28px;
      z-index: 1;
    }

    .progress {
      height: 10px;
      border-radius: 999px;
      background: rgba(127,196,255,.09);
      overflow: hidden;
    }

    .progress i {
      display: block;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, #7fc4ff, #4cc99d);
    }

    .bullets {
      margin: 0;
      padding: 0;
      list-style: none;
      display: grid;
      gap: 10px;
    }

    .bullets li {
      display: flex;
      align-items: start;
      gap: 10px;
      line-height: 1.8;
      color: #dcecff;
    }

    .bullets li::before {
      content: "";
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: var(--accent);
      margin-top: 10px;
      flex-shrink: 0;
      box-shadow: 0 0 0 5px rgba(127,196,255,.08);
    }

    .window.empty .window-body {
      min-height: 160px;
      display: grid;
      place-items: center;
      color: var(--muted);
      text-align: center;
      line-height: 1.9;
      border: 1px dashed rgba(98,145,205,.18);
      border-radius: 18px;
      padding: 18px;
    }

    @media (max-width: 1200px) {
      .topbar { grid-template-columns: 1fr; }
      .workspace { grid-template-columns: 1fr; }
      .nav-tabs { grid-template-columns: repeat(3, minmax(0, 1fr)); }
      .metrics { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }

    @media (max-width: 720px) {
      .shell { width: calc(100vw - 16px); margin: 8px auto 18px; }
      .nav-tabs { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .metrics, .status-strip, .field-grid, .tiles-2, .tiles-3 { grid-template-columns: 1fr; }
      .brand h1 { font-size: 24px; }
      .tab-btn { min-height: 74px; font-size: 16px; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <section class="topbar">
      <div class="hero">
        <div class="brand">
          <div>
            <h1>إشارات الجسد | Bio-OS</h1>
            <small>منصة عربية أولًا لدعم intake السريري، تقييم كفاية البيانات، اقتراح الفحوص الضرورية فقط، وبناء خطة وقاية ومتابعة ضمن منطق نوافذ ثابت قابل للتطوير.</small>
          </div>
        </div>
        <div class="status-strip" id="heroStrip"></div>
      </div>
      <div class="metrics" id="metrics"></div>
    </section>

    <nav class="nav-tabs" id="tabs"></nav>
    <main class="workspace" id="workspace"></main>
  </div>

  <script>
    const db = {
      heroStrip: [
        { k: 'الحد', v: 'ليس تشخيصًا نهائيًا' },
        { k: 'الهدف', v: 'تمكين + وقاية' },
        { k: 'المنهج', v: 'Minimum Necessary Testing' },
        { k: 'الوضع', v: 'STATIC MVP' }
      ],
      metrics: [
        { label: 'كفاية البيانات', value: '78%', note: 'صالح كبداية وليس للحكم النهائي', cls: 'good' },
        { label: 'الإنذارات المبكرة', value: '2', note: 'يلزم مراجعة وتسلسل أوضح', cls: 'warn' },
        { label: 'المتابعة', value: 'نشطة', note: 'آخر تحديث اليوم', cls: 'good' },
        { label: 'النتائج', value: 'أولية', note: 'تحتاج استكمال البيانات', cls: 'warn' },
        { label: 'لوحة المريض', value: 'جاهزة', note: 'مدفوعة ببيانات الملف', cls: 'good' },
        { label: 'الدخول', value: 'محلي', note: 'يمكن وصله بقاعدة لاحقًا', cls: 'danger' }
      ],
      tabs: [
        {
          id: 'login',
          title: 'الدخول',
          columns: [
            [
              {
                code: 'AUTH / LOCAL',
                title: 'تسجيل الدخول / إنشاء حساب',
                bodyType: 'form',
                fields: [
                  ['الاسم', 'المستخدم الحالي'],
                  ['البريد', 'bio@example.com'],
                  ['الدور', 'مريض'],
                  ['كلمة المرور', '••••••••']
                ],
                buttons: ['دخول', 'إنشاء حساب'],
                note: 'هذه الواجهة هيكل ثابت. لاحقًا يمكن ربطها بجدول users داخل SQLite أو Supabase.'
              }
            ],
            [
              {
                code: 'GUARDRAILS',
                title: 'الضوابط الطبية',
                bodyType: 'list',
                items: [
                  { title: 'لا حكم نهائي بلا بيانات كافية', note: 'كل output هنا فرضية أولية أو توصية فحص أو خطة وقاية.' },
                  { title: 'الأعراض والتحاليل مدخلات', note: 'المنصة تبني sufficiency score ثم differential ranking ثم next best tests فقط.' },
                  { title: 'Red Flags أولًا', note: 'أي إنذار يوقف reasoning العادي ويوجه للمراجعة أو التقييم العاجل.' }
                ]
              }
            ],
            [
              {
                code: 'BOOT',
                title: 'مؤشرات البدء',
                bodyType: 'tiles',
                tiles: [
                  { label: 'Encounters', value: '0', note: 'لا توجد جلسات بعد' },
                  { label: 'المستخدمون', value: '0', note: 'نظام محلي تجريبي' },
                  { label: 'المستخدم الحالي', value: 'مسجل', note: 'يظهر في الرأس' },
                  { label: 'آخر دخول', value: 'اليوم', note: 'محاكاة محلية' }
                ]
              }
            ]
          ]
        },
        {
          id: 'patient',
          title: 'لوحة المريض',
          columns: [
            [
              {
                code: 'PROFILE',
                title: 'ملف المريض',
                bodyType: 'form',
                fields: [
                  ['العمر', '34'],
                  ['الجنس', 'أنثى'],
                  ['الطول cm', '165'],
                  ['الوزن kg', '71'],
                  ['الخصر cm', '86'],
                  ['البلد', 'السعودية']
                ],
                note: 'كل حقل يمكن وصله بجدول patients ثم يظهر في باقي النوافذ.'
              }
            ],
            [
              {
                code: 'MAP',
                title: 'قراءة baseline',
                bodyType: 'list',
                items: [
                  { title: 'BMI', note: 'ضمن القراءة الأساسية الحالية' },
                  { title: 'استقلاب منخفض/غير كاف', note: 'يدل على حاجة لاستكمال النوم والنشاط' },
                  { title: 'الدوافع غير محدد', note: 'الهدف الوقائي يحتاج تحديدًا أدق' },
                  { title: 'الوقاية غير مبني', note: 'الخطة تظهر بعد تشغيل المحرك' }
                ]
              },
              {
                code: 'MODE',
                title: 'نوع الفحص',
                bodyType: 'buttons',
                buttons: ['فحص عام', 'فحص خاص بأعراض', 'بدء Encounter'],
                note: 'يحافظ هذا القسم على ثبات منطق النوافذ بدل تغيير التصميم كل مرة.'
              }
            ],
            [
              {
                code: 'RECENT',
                title: 'آخر encounters',
                bodyType: 'empty',
                emptyText: 'لا توجد encounters بعد. عند بدء أول ملف ستظهر هنا آخر الجلسات والنتائج المرحلية.'
              }
            ]
          ]
        },
        {
          id: 'wizard',
          title: 'Intake Wizard',
          columns: [
            [
              {
                code: 'INTAKE',
                title: 'خطوات المعالج',
                bodyType: 'list',
                items: [
                  { title: '1. السلامة', note: 'أعراض عاجلة، red flags، مستوى الخطر' },
                  { title: '2. الأعراض', note: 'الزمن، الشدة، النمط، المحفزات' },
                  { title: '3. التحاليل', note: 'الموجود، الناقص، والضروري فقط' },
                  { title: '4. الغذاء/الأدوية', note: 'ما الذي قد يفسر الصورة؟' },
                  { title: '5. النوم/الإخراج', note: 'طبقات غالبًا تُهمل لكنها حاسمة' },
                  { title: '6. تشغيل', note: 'إرسال المدخلات للمحرك' }
                ]
              }
            ],
            [
              {
                code: 'FLOW',
                title: 'منطق التشغيل',
                bodyType: 'bullets',
                bullets: [
                  'كل خطوة تحفظ في نفس بنية النوافذ ولا تغيّر واجهة المشروع.',
                  'يمكن ربط كل تبويب بجدول مستقل: symptoms, labs, medications, sleep, stool.',
                  'النظام يعيد استخدام نفس shell ويبدّل المحتوى فقط.'
                ]
              }
            ],
            [
              {
                code: 'ACTION',
                title: 'أزرار التنفيذ',
                bodyType: 'buttons',
                buttons: ['السابق', 'التالي', 'حفظ المسودة'],
                note: 'هذا الهيكل مناسب للتحويل لاحقًا إلى React أو Electron.'
              }
            ]
          ]
        },
        {
          id: 'results',
          title: 'النتائج',
          columns: [
            [
              {
                code: 'SCORE',
                title: 'Diagnostic Sufficiency',
                bodyType: 'ring',
                percent: 0,
                note: 'لا توجد نتيجة قبل التشغيل'
              },
              {
                code: 'SAFETY',
                title: 'Red Flags',
                bodyType: 'empty',
                emptyText: 'لا توجد نتيجة بعد'
              }
            ],
            [
              {
                code: 'RANKED',
                title: 'Differential Ranking',
                bodyType: 'empty',
                emptyText: 'شغّل المحرك أولًا'
              },
              {
                code: 'TESTS',
                title: 'الفحوص المطلوبة فقط',
                bodyType: 'empty',
                emptyText: 'لا توجد توصيات بعد'
              }
            ],
            [
              {
                code: 'PLAN',
                title: 'خطة التدخل والوقاية',
                bodyType: 'empty',
                emptyText: 'لا توجد خطة بعد'
              },
              {
                code: 'WHY',
                title: 'Explainability',
                bodyType: 'empty',
                emptyText: 'التفسير سيظهر بعد التشغيل'
              }
            ]
          ]
        },
        {
          id: 'followup',
          title: 'المتابعة',
          columns: [
            [
              {
                code: 'LONGITUDINAL',
                title: 'المتابعة الزمنية',
                bodyType: 'empty',
                emptyText: 'لا توجد متابعة بعد'
              }
            ],
            [
              {
                code: 'RELAPSE',
                title: 'منع التكرار',
                bodyType: 'empty',
                emptyText: 'يظهر بعد أول تشغيل'
              }
            ],
            [
              {
                code: 'EVENT',
                title: 'إضافة متابعة',
                bodyType: 'form',
                fields: [
                  ['التاريخ', '2026-03-18'],
                  ['النوع', 'إعادة فحص'],
                  ['الهدف', 'مراجعة الاستجابة']
                ],
                buttons: ['إضافة'],
                note: 'كل حدث متابعة يمكن تخزينه بجدول followups وربطه بالملف.'
              }
            ]
          ]
        },
        {
          id: 'admin',
          title: 'Clinician/Admin',
          columns: [
            [
              {
                code: 'QUEUE',
                title: 'Clinician Queue',
                bodyType: 'empty',
                emptyText: 'لا توجد حالات بانتظار المراجعة'
              }
            ],
            [
              {
                code: 'AUDIT',
                title: 'Audit Console',
                bodyType: 'empty',
                emptyText: 'لا توجد سجلات'
              }
            ],
            [
              {
                code: 'GUARDS',
                title: 'سياسات سريرية',
                bodyType: 'list',
                items: [
                  { title: 'لا output نهائي بلا evidence كافٍ', note: 'كل hypothesis تبقى أولية حتى تتوفر الأداة أو المراجعة.' },
                  { title: 'High-risk review required', note: 'الحمل، الأطفال، كبار السن، والـ red flags تنتقل للمراجعة.' }
                ]
              }
            ]
          ]
        },
        {
          id: 'knowledge',
          title: 'المعرفة',
          columns: [
            [
              {
                code: 'WHY',
                title: 'لماذا لم تُحل بعض الأمراض المزمنة حتى الآن؟',
                bodyType: 'list',
                items: [
                  { title: 'تغاير المرض', note: 'السرطان ليس مرضًا واحدًا، ومقاومة الإنسولين ليست مسارًا واحدًا.' },
                  { title: 'الاكتشاف المتأخر', note: 'كثير من المسارات تُكتشف بعد سنوات من الاضطراب.' },
                  { title: 'إدارة العرض بدل علاج السبب', note: 'إذا هُدئ العرض وبقي السبب عاد المرض أو تغير شكله.' },
                  { title: 'غياب biomarker حاسم واحد', note: 'كثير من الحالات تحتاج قراءة متعددة الطبقات.' }
                ]
              }
            ],
            [
              {
                code: 'DOMAINS',
                title: 'MVP Domains',
                bodyType: 'list',
                items: [
                  { title: 'insulin resistance / prediabetes risk', note: 'مقاومة الإنسولين ومخاطر ما قبل السكري' },
                  { title: 'iron deficiency / nutrient stores', note: 'مخازن الحديد والاحتياطات الغذائية' },
                  { title: 'sleep/circadian dysfunction', note: 'النوم والساعة البيولوجية' },
                  { title: 'bowel dysfunction / GI patterns', note: 'اضطرابات الجهاز الهضمي وأنماط الإخراج' },
                  { title: 'thyroid / inflammation suspicion', note: 'اشتباه الدرقية والالتهاب' }
                ]
              }
            ],
            [
              {
                code: 'INTEROP',
                title: 'FHIR-ready intent',
                bodyType: 'list',
                items: [
                  { title: 'Questionnaire / QuestionnaireResponse', note: 'لبناء intake منظم وقابل للنقل' },
                  { title: 'Observation', note: 'لتخزين القراءات والأعراض والقياسات' },
                  { title: 'Condition / Hypothesis', note: 'لتمييز الفرضية عن التشخيص النهائي' },
                  { title: 'MedicationStatement', note: 'للسياق العلاجي والتداخلات' }
                ]
              }
            ]
          ]
        }
      ]
    };

    const heroStripEl = document.getElementById('heroStrip');
    const metricsEl = document.getElementById('metrics');
    const tabsEl = document.getElementById('tabs');
    const workspaceEl = document.getElementById('workspace');

    function renderHero() {
      heroStripEl.innerHTML = db.heroStrip.map(x => `
        <div class="status-pill">
          <div class="k">${x.k}</div>
          <div class="v">${x.v}</div>
        </div>
      `).join('');

      metricsEl.innerHTML = db.metrics.map(x => `
        <div class="metric-card ${x.cls || ''}">
          <div class="label">${x.label}</div>
          <div class="value">${x.value}</div>
          <div class="label">${x.note}</div>
        </div>
      `).join('');
    }

    function renderTabs(activeId = 'login') {
      tabsEl.innerHTML = db.tabs.map(tab => `
        <button class="tab-btn ${tab.id === activeId ? 'active' : ''}" data-id="${tab.id}">${tab.title}</button>
      `).join('');

      tabsEl.querySelectorAll('.tab-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          renderTabs(btn.dataset.id);
          renderWorkspace(btn.dataset.id);
        });
      });
    }

    function windowTemplate(w) {
      const body = renderBody(w);
      const emptyClass = w.bodyType === 'empty' ? ' empty' : '';
      return `
        <section class="window${emptyClass}" data-code="${w.code || ''}">
          <div class="window-header">
            <div>
              <h3 class="window-title">${w.title}</h3>
              ${w.note ? `<div class="window-subtitle">${w.note}</div>` : ''}
            </div>
          </div>
          <div class="window-body">${body}</div>
        </section>
      `;
    }

    function renderBody(w) {
      if (w.bodyType === 'tiles') {
        return `<div class="tiles-2">${(w.tiles || []).map(tile => `
          <div class="tile">
            <div class="t-label">${tile.label}</div>
            <div class="t-value">${tile.value}</div>
            <div class="t-note">${tile.note || ''}</div>
          </div>
        `).join('')}</div>`;
      }

      if (w.bodyType === 'list') {
        return `<div class="stack">${(w.items || []).map((item, i) => `
          <div class="list-item">
            <div>
              <strong>${item.title}</strong>
              ${item.note ? `<small>${item.note}</small>` : ''}
            </div>
            <span class="badge">${i + 1}</span>
          </div>
        `).join('')}</div>`;
      }

      if (w.bodyType === 'form') {
        const fields = (w.fields || []).map(([label, value]) => `
          <div class="field">
            <label>${label}</label>
            <div class="mock-input">${value}</div>
          </div>
        `).join('');
        return `
          <div class="stack">
            <div class="field-grid">${fields}</div>
            ${w.buttons ? `<div class="button-row">${w.buttons.map((b, i) => `<div class="button ${i===0 ? 'primary' : ''}">${b}</div>`).join('')}</div>` : ''}
            ${w.note ? `<div class="text-block">${w.note}</div>` : ''}
          </div>
        `;
      }

      if (w.bodyType === 'buttons') {
        return `
          <div class="stack">
            <div class="button-row">${(w.buttons || []).map((b, i) => `<div class="button ${i === 0 ? 'primary' : ''}">${b}</div>`).join('')}</div>
            ${w.note ? `<div class="text-block">${w.note}</div>` : ''}
          </div>
        `;
      }

      if (w.bodyType === 'ring') {
        const p = Number(w.percent || 0);
        return `
          <div class="stack" style="text-align:center;">
            <div class="ring" style="--p:${p}"><span>${p}%</span></div>
            <div class="text-block">${w.note || ''}</div>
          </div>
        `;
      }

      if (w.bodyType === 'bullets') {
        return `<ul class="bullets">${(w.bullets || []).map(b => `<li>${b}</li>`).join('')}</ul>`;
      }

      if (w.bodyType === 'empty') {
        return `${w.emptyText || 'لا توجد بيانات بعد'}`;
      }

      return `<div class="text-block">${w.note || ''}</div>`;
    }

    function renderWorkspace(activeId) {
      const tab = db.tabs.find(t => t.id === activeId) || db.tabs[0];
      workspaceEl.innerHTML = tab.columns.map(group => `
        <div class="col">${group.map(windowTemplate).join('')}</div>
      `).join('');
    }

    renderHero();
    renderTabs('login');
    renderWorkspace('login');
  </script>
</body>
</html>
